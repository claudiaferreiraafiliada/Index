<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #06181a;
    --bg-panel: #0c2a2c;
    --line: #173f40;
    --cyan: #6cf5e0;
    --lime: #c6f24e;
    --text: #eaf6f4;
    --text-dim: #8fb3ae;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg-deep);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: center;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 40px 32px 32px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, var(--cyan), var(--lime));
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--lime);
    border: 1px solid var(--lime);
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 24px;
  }

  .avatar {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--lime));
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 26px;
    color: var(--bg-deep);
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  p.subtitle {
    color: var(--text-dim);
    font-size: 14.5px;
    line-height: 1.55;
    margin-bottom: 32px;
  }

  .cta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: var(--cyan);
    color: var(--bg-deep);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15.5px;
    padding: 16px 20px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.18s ease, transform 0.12s ease;
  }

  .cta:hover {
    background: var(--lime);
    transform: translateY(-1px);
  }

  .cta .arrow {
    font-size: 18px;
    transition: transform 0.18s ease;
  }

  .cta:hover .arrow {
    transform: translateX(3px);
  }

  .meta {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--lime);
    flex-shrink: 0;
  }

  footer {
    margin-top: 36px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    opacity: 0.6;
  }
</style>
</head>
<body>

  <div class="card">
    <span class="tag">DBM</span>
    <div class="avatar">D</div>
    <h1>Antes de continuares, vê isto.</h1>
    <p class="subtitle">
      Reuni tudo o que precisas de saber num só lugar — sem rodeios,
      sem enrolar. Clica abaixo para avançar.
    </p>

    <a href="https://stan.store/affiliates/83a4e193-a718-4f95-9730-3bbbb1f423d0" class="cta" target="_blank" rel="noopener">
      Quero saber mais
      <span class="arrow">→</span>
    </a>

    <div class="meta">
      <span class="dot"></span>
      <span>Conteúdo atualizado</span>
    </div>
  </div>

  <footer>DBM © 2026</footer>

</body>
</html>
